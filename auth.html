<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeoGuard - Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        height: 100%;
        font-family: 'Sora', sans-serif;
      }

      body {
        background-image: url('/bg.jpeg');
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #f6f7ff;
      }

      @media (max-width: 768px) {
        body {
          background-image: url('/mobile-bg.jpg');
          background-position: center top;
          background-attachment: scroll;
        }
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: linear-gradient(180deg, rgba(4, 8, 19, 0.5), rgba(6, 8, 18, 0.6));
        pointer-events: none;
        z-index: 0;
      }

      .auth-container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 420px;
        padding: 0 20px;
      }

      .auth-card {
        background: rgba(17, 25, 55, 0.68);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        padding: 40px 30px;
        box-shadow: 0 30px 60px rgba(3, 5, 21, 0.36);
      }

      .auth-header {
        text-align: center;
        margin-bottom: 32px;
      }

      .auth-header h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 2rem;
        margin: 0;
        letter-spacing: -0.04em;
      }

      .auth-header p {
        color: #bac4ff;
        margin: 8px 0 0;
        font-size: 0.9rem;
      }

      .form-group {
        margin-bottom: 16px;
      }

      label {
        display: block;
        color: #bac4ff;
        font-size: 0.8rem;
        margin-bottom: 6px;
        font-weight: 500;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(5, 10, 30, 0.22);
        color: #f6f7ff;
        font-family: inherit;
        outline: none;
        transition: border-color 200ms;
      }

      input::placeholder {
        color: rgba(186, 196, 255, 0.58);
      }

      input:focus {
        border-color: rgba(34, 199, 255, 0.4);
      }

      .error-message {
        color: #ff6b91;
        font-size: 0.75rem;
        margin-top: 4px;
        display: none;
      }

      .error-message.show {
        display: block;
      }

      .button-group {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
      }

      button {
        flex: 1;
        padding: 12px 16px;
        border: none;
        border-radius: 12px;
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: transform 180ms, opacity 180ms;
      }

      button:active {
        transform: scale(0.98);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-primary {
        background: linear-gradient(135deg, #7b7dff, #22c7ff);
        color: #f6f7ff;
        box-shadow: 0 16px 30px rgba(34, 199, 255, 0.18);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.08);
        color: #f6f7ff;
      }

      .tab-switcher {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      }

      .tab-btn {
        flex: 1;
        padding: 10px;
        background: none;
        border: none;
        color: #bac4ff;
        border-bottom: 2px solid transparent;
        cursor: pointer;
        transition: color 200ms;
        font-size: 0.9rem;
        font-weight: 600;
      }

      .tab-btn.active {
        color: #22c7ff;
        border-bottom-color: #22c7ff;
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      .divider {
        text-align: center;
        color: #bac4ff;
        margin: 16px 0;
        font-size: 0.85rem;
      }

      .status-message {
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 0.85rem;
        margin-bottom: 16px;
        display: none;
      }

      .status-message.show {
        display: block;
      }

      .status-message.success {
        background: rgba(111, 255, 176, 0.2);
        color: #6fffb0;
        border: 1px solid rgba(111, 255, 176, 0.3);
      }

      .status-message.error {
        background: rgba(255, 107, 145, 0.2);
        color: #ff6b91;
        border: 1px solid rgba(255, 107, 145, 0.3);
      }

      .status-message.info {
        background: rgba(34, 199, 255, 0.2);
        color: #22c7ff;
        border: 1px solid rgba(34, 199, 255, 0.3);
      }

      .status-message.warning {
        background: rgba(255, 107, 145, 0.2);
        color: #ffd7e3;
        border: 1px solid rgba(255, 107, 145, 0.45);
        font-weight: 700;
      }

      .checkbox-group {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
        font-size: 0.85rem;
      }

      input[type="checkbox"] {
        width: auto;
        cursor: pointer;
      }

      .signup-actions {
        display: grid;
        gap: 10px;
      }

      #request-access-btn {
        display: none;
      }

      .waiting-note {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(123, 125, 255, 0.18);
        border: 1px solid rgba(123, 125, 255, 0.4);
        color: #d8dcff;
        font-size: 0.82rem;
        display: none;
      }

      .waiting-note.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>NeoGuard</h1>
          <p>Smart Neonatal Monitoring System</p>
        </div>

        <div class="tab-switcher">
          <button id="signin-tab-btn" class="tab-btn active" onclick="switchTab('signin', this)">Sign In</button>
          <button id="signup-tab-btn" class="tab-btn" onclick="switchTab('signup', this)">Sign Up</button>
        </div>

        <!-- Sign In Tab -->
        <div id="signin-tab" class="tab-content active">
          <div id="signin-status" class="status-message"></div>

          <div class="form-group">
            <label for="signin-email">Email</label>
            <input id="signin-email" type="email" placeholder="nurse@example.com" />
            <div class="error-message" id="signin-email-error"></div>
          </div>

          <div class="form-group">
            <label for="signin-password">Password</label>
            <input id="signin-password" type="password" placeholder="Enter your password" />
            <div class="error-message" id="signin-password-error"></div>
          </div>

          <div class="button-group">
            <button class="btn-primary" id="signin-btn" onclick="handleSignIn()">Sign In</button>
            <button class="btn-secondary" onclick="handleForgotPassword()">Forgot?</button>
          </div>
        </div>

        <!-- Sign Up Tab -->
        <div id="signup-tab" class="tab-content">
          <div id="signup-status" class="status-message"></div>

          <div class="form-group">
            <label for="signup-name">Full Name</label>
            <input id="signup-name" type="text" placeholder="Your full name" />
            <div class="error-message" id="signup-name-error"></div>
          </div>

          <div class="form-group">
            <label for="signup-email">Email</label>
            <input id="signup-email" type="email" placeholder="nurse@example.com" />
            <div class="error-message" id="signup-email-error"></div>
          </div>

          <div class="form-group">
            <label for="signup-password">Password</label>
            <input id="signup-password" type="password" placeholder="At least 6 characters" />
            <div class="error-message" id="signup-password-error"></div>
          </div>

          <div class="checkbox-group">
            <input id="signup-verify" type="checkbox" checked />
            <label for="signup-verify">I agree to receive a verification email</label>
          </div>

          <div class="signup-actions">
            <button class="btn-primary" id="signup-btn" onclick="handleSignUp()">Verify Email</button>
            <button class="btn-secondary" id="request-access-btn" onclick="handleRequestAccess()">Request Access</button>
          </div>

          <div id="signup-waiting" class="waiting-note"></div>

          <div class="divider">Step 1: Verify email. Step 2: Request access for admin approval.</div>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
    <script src="./web/firebase-config.js"></script>
    <script src="./auth/auth.js"></script>
  </body>
</html>
